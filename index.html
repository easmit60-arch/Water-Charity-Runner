<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rouge Support Network Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: radial-gradient(circle at 20% 15%, #121b38 0%, #070b17 42%, #030509 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Avenir Next', Avenir, 'Montserrat', 'Segoe UI', sans-serif;
    color: #d8eeff;
    padding: 12px;
  }

  .game-shell {
    width: min(460px, 100%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    background: rgba(5, 12, 24, 0.92);
    border: 1px solid #00d9ff;
    box-shadow: 0 0 16px rgba(0, 217, 255, 0.45), 0 0 28px rgba(255, 0, 110, 0.2);
    border-radius: 10px;
    padding: 10px;
  }

  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  #brand {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.62);
    border: 1px solid #ff006e;
    box-shadow: 0 0 10px rgba(255, 0, 110, 0.45);
    border-radius: 6px;
    padding: 4px 8px;
  }

  #brand img {
    width: 90px;
    height: auto;
  }

  #brandText {
    font-weight: 700;
    font-size: 14px;
    color: #ff4b8f;
    text-shadow: 0 0 8px rgba(255, 0, 110, 0.7);
  }

  #boardWrap {
    position: relative;
    width: min(440px, 100%);
    align-self: center;
  }

  #dropsContainer {
    position: absolute;
    top: 0;
    left: 0;
    width: min(440px, 100%);
    height: min(440px, 100%);
    pointer-events: none;
    z-index: 10;
  }

  #startBtn {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 96px;
    height: 96px;
    border: 0;
    background: transparent;
    padding: 0;
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #startBtn img {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.85)) drop-shadow(0 0 16px rgba(255, 0, 110, 0.45));
  }

  #startBtn:hover {
    transform: translateX(-50%) scale(1.04);
  }

  #startBtn:focus-visible {
    outline: 2px solid #c9ecff;
    border-radius: 50%;
  }

  .top-nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    font-size: 12px;
    padding: 6px 8px;
    border: 1px solid #00d9ff;
    border-radius: 6px;
    background: rgba(4, 14, 26, 0.9);
    box-shadow: inset 0 0 10px rgba(0, 217, 255, 0.2);
  }

  .top-nav a {
    color: #00d9ff;
    text-decoration: none;
    font-weight: 600;
    text-shadow: 0 0 6px rgba(0, 217, 255, 0.55);
  }

  .top-nav a:hover {
    color: #ff4b8f;
    text-decoration: underline;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  #score {
    font-weight: 700;
  }

  #timer {
    font-weight: 700;
    color: #d9f1ff;
    font-size: 13px;
  }

  #tinInfo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }

  #bankedCashDisplay {
    min-width: 104px;
    font-weight: 700;
    color: #c9ecff;
  }

  #bankSlots {
    display: flex;
    gap: 4px;
  }

  .bank-slot {
    width: 13px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid #8ea4b8;
    background: #d7dfe7;
  }

  .bank-slot.filled {
    background: linear-gradient(to top, #2f9bff 0 70%, #d7dfe7 70%);
  }

  #investmentPanel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  #difficultyPanel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    border: 1px solid #00d9ff;
    border-radius: 6px;
    padding: 6px 8px;
    background: rgba(2, 14, 30, 0.9);
    color: #c9efff;
    font-size: 12px;
  }

  #difficultySelect {
    border: 1px solid #00d9ff;
    background: #0b1527;
    color: #9befff;
    border-radius: 6px;
    padding: 4px 8px;
    font-weight: 700;
  }

  #difficultyHint {
    color: #b8d7ef;
    font-size: 12px;
  }

  #investmentControls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #investButton {
    border: 1px solid #ff006e;
    background: #14081a;
    color: #ffd0e8;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  #bankButton {
    border: 1px solid #00d9ff;
    background: #061226;
    color: #d8eeff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  #investButton:disabled,
  #bankButton:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #controlHint {
    font-size: 12px;
    color: #a8c4dd;
  }

  #boardWrap {
    position: relative;
    max-width: 440px;
    width: 100%;
    margin: 0 auto;
  }

  canvas {
    border: 1px solid #00d9ff;
    display: block;
    width: 100%;
    max-width: 440px;
    align-self: center;
    background: #040b18;
    box-shadow: inset 0 0 18px rgba(0, 217, 255, 0.2), 0 0 14px rgba(0, 217, 255, 0.35);
  }

  .gif-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    max-width: 440px;
    height: 440px;
    display: none;
    border: 1px solid #00d9ff;
    border-radius: 0;
    z-index: 15;
  }

  .gif-overlay.visible {
    display: block;
  }

  #investGifOverlay {
    object-fit: contain;
    object-position: center;
    z-index: 16;
  }

  #floodLossGifOverlay {
    opacity: 0.6;
    object-fit: cover;
    z-index: 15;
  }

  #status {
    margin: 0;
    min-height: 20px;
    font-size: 14px;
    text-align: center;
  }

  #milestone {
    margin: 0;
    min-height: 20px;
    font-size: 13px;
    text-align: center;
    color: #ffd25e;
  }

  #playAgainBtn {
    border: 1px solid #ff006e;
    background: #230d2f;
    color: #ffe4f3;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    align-self: center;
    box-shadow: 0 0 12px rgba(255, 0, 110, 0.4);
  }

  #impactPanel {
    border: 1px solid #00d9ff;
    border-radius: 6px;
    background: rgba(3, 14, 26, 0.88);
    box-shadow: inset 0 0 10px rgba(0, 217, 255, 0.15);
    padding: 8px;
  }

  #impactTitle {
    margin: 0 0 6px;
    color: #ff4b8f;
    font-size: 12px;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255, 0, 110, 0.6);
  }

  #impactFeed {
    margin: 0;
    padding-left: 18px;
    min-height: 54px;
    font-size: 12px;
    color: #d8eeff;
  }

  #impactFeed li {
    margin: 2px 0;
  }

  #cwFooter {
    border-top: 1px solid #00d9ff;
    margin-top: 4px;
    padding-top: 8px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: #b9d6ec;
  }

  #cwFooter a {
    color: #00d9ff;
    font-weight: 700;
    text-decoration: none;
    text-shadow: 0 0 8px rgba(0, 217, 255, 0.5);
  }

  #cwFooter a:hover {
    color: #ff4b8f;
    text-decoration: underline;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 500px) {
    #brand img {
      width: 74px;
    }

    #brandText {
      font-size: 12px;
    }

    #topBar {
      flex-wrap: wrap;
    }
  }
  </style>
</head>
<body>
<div class="game-shell">
  <nav class="top-nav" aria-label="Main navigation">
    <a href="index.html">Game</a>
    <a href="README.md">Prompt Guide (README)</a>
  </nav>
  <div id="topBar" class="top-bar">
    <div id="brand" class="logo">
      <a id="upper-logo" href="https://rougesupportnetwork.org/" target="_blank" rel="noopener noreferrer" aria-label="Visit Rouge Support Network">
        <img src="RSN.img/RSN%28Logo%29.webp" alt="Rouge Support Network">
      </a>
      <a id="brandText" class="lower-logo" href="https://rougesupportnetwork.org/" target="_blank" rel="noopener noreferrer">Rouge Support Network</a>
    </div>
  </div>
  <div id="hud">
    <span id="score">Score: 0</span>
    <span id="timer">Flourishing: --</span>
    <div id="bankInfo">
      <span id="bankedCashDisplay">Banked: 0/100</span>
      <div id="bankSlots">
        <span class="bank-slot" id="slot-1"></span>
        <span class="bank-slot" id="slot-2"></span>
        <span class="bank-slot" id="slot-3"></span>
      </div>
    </div>
  </div>
  <div id="investmentPanel">
    <div id="investmentControls">
      <button id="investButton" type="button" disabled>Invest (locked)</button>
      <button id="bankButton" type="button" disabled>Bank Cash: S</button>
    </div>
    <span id="controlHint">Move: ← → ↑ ↓ | Invest: D | Bank Cash: S</span>
  </div>
  <div id="difficultyPanel">
    <label for="difficultySelect">Difficulty</label>
    <select id="difficultySelect" aria-label="Select difficulty">
      <option value="easy">Easy</option>
      <option value="normal" selected>Normal</option>
      <option value="hard">Hard</option>
    </select>
    <span id="difficultyHint">Applies on Start/Play Again</span>
  </div>
  <div id="boardWrap">
    <canvas width="440" height="440" id="game"></canvas>
    <div id="dropsContainer"></div>
    <img id="investGifOverlay" class="gif-overlay" src="RSN.img/Sex_Worker_Social.gif" alt="Investment overlay">
    <img id="floodLossGifOverlay" class="gif-overlay" src="RSN.img/WWAD.gif" alt="Flood loss overlay">
    <button id="startBtn" type="button" aria-label="Start game">
      <img src="RSN.img/Cash.gif" alt="Start Rouge Support Network Runner">
    </button>
  </div>
  <p id="status"></p>
  <p id="milestone"></p>
  <div id="impactPanel">
    <p id="impactTitle">Mission Feed</p>
    <ul id="impactFeed"></ul>
  </div>
  <button id="playAgainBtn" type="button" class="hidden">Play Again</button>
  <footer id="cwFooter">
    <span>Learn more and support Rouge Support Network:</span>
    <a href="https://rougesupportnetwork.org/" target="_blank" rel="noopener noreferrer">Rouge Support Network Website</a>
    <a href="https://rougesupportnetwork.org/" target="_blank" rel="noopener noreferrer">Support</a>
  </footer>
</div>
<script src="script.js"></script>
</body>
</html>
